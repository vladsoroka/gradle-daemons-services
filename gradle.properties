pluginGroup = com.github.vladsoroka.gradle.daemon.services
pluginRepositoryUrl = https://github.com/vladsoroka/gradle-daemons-services
# SemVer format -> https://semver.org
pluginVersion = 0.0.2

pluginSinceBuild = 1.23.11
pluginUntilBuild = 1.23.*

# IntelliJ Platform Properties -> https://plugins.jetbrains.com/docs/intellij/tools-gradle-intellij-plugin.html#configuration-intellij-extension
intellijType = IC
intellijVersion = 2022.2.5

gradleVersion = 8.2.1

# Opt-out flag for bundling Kotlin standard library -> https://jb.gg/intellij-platform-kotlin-stdlib
kotlin.stdlib.default.dependency = false

# Enable Gradle Configuration Cache -> https://docs.gradle.org/current/userguide/configuration_cache.html
#org.gradle.configuration-cache = true

# Enable Gradle Build Cache -> https://docs.gradle.org/current/userguide/build_cache.html
#org.gradle.caching = true

# Enable Gradle Kotlin DSL Lazy Property Assignment -> https://docs.gradle.org/current/userguide/kotlin_dsl.html#kotdsl:assignment
systemProp.org.gradle.unsafe.kotlin.assignment = true

## Fleet properties
fleetRuntimeVersion = 1.23.75
fleetRuntimeMinVersion = 1.23.0
fleetRuntimeMaxVersion = 1.23.100

# temporary properties
backendLibPath=../gradle-daemons-plugin/system/fleet/intellij-plugin/fleet-backend-1.23.75.tar.zst_731dd0950ff7bb26d21a29970ccf3829/FleetBackend 2023.3 EAP.app/Contents/lib
